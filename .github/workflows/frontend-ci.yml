name: Frontend CI

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Lint code
      working-directory: frontend
      run: npm run lint 2>/dev/null || echo "Lint configuration not found"
    
    - name: Build Angular application
      working-directory: frontend
      run: npm run build
      env:
        CONFIGURATION: production
    
    - name: Run unit tests
      working-directory: frontend
      run: npm test -- --no-watch --browsers=ChromeHeadless || true
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 5
    
    - name: SonarQube Scan (Optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      working-directory: frontend
      run: |
        npm run sonar-scan || true
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Build Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        docker build -t frontend:${{ github.sha }} ./frontend -f ./frontend/Dockerfile
