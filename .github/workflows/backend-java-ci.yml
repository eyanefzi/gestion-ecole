name: Backend Java CI

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/config-server/**'
      - 'backend/courses-service/**'
      - 'backend/eureka-server/**'
      - 'backend/quiz-service/**'
      - 'backend/student-service/**'
      - '.github/workflows/backend-java-ci.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/config-server/**'
      - 'backend/courses-service/**'
      - 'backend/eureka-server/**'
      - 'backend/quiz-service/**'
      - 'backend/student-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: 
          - api-gateway
          - config-server
          - courses-service
          - eureka-server
          - quiz-service
          - student-service
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build ${{ matrix.service }} with Maven
      run: |
        cd backend/${{ matrix.service }}
        mvn clean package -DskipTests
    
    - name: Run tests for ${{ matrix.service }}
      run: |
        cd backend/${{ matrix.service }}
        mvn test
    
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.service }}-artifacts
        path: backend/${{ matrix.service }}/target/*.jar
        retention-days: 5
    
