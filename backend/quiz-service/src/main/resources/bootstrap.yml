spring:
  application:
    name: quiz-service
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      username: ${SPRING_CLOUD_CONFIG_USERNAME:configuser}
      password: ${SPRING_CLOUD_CONFIG_PASSWORD:configpass}
      fail-fast: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
